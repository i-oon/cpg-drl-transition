# Phase 1 – Walk: Indirect encoding + phase offsets + tanh + fixed oscillator
# W shape (20, 3): shared across all legs, phase offsets create timing.

cpg:
  alpha: 1.01
  freq_train: 1.0
  dt: 0.02

rbf:
  num_neurons: 20
  variance: 0.04

gait:
  name: walk
  phase_offsets: [0.0, 3.14159, 1.5708, 4.7124]

pibb:
  init_mode: cosine             # "random" or "cosine" (Thor walking prior)
  exploration_noise: 0.045
  noise_decay_rate: 0.998       # slow decay
  temperature: 10.0
  init_var_boost: 2.0
  max_iterations: 2000
  convergence_threshold: 0.001

reward:
  w1_distance: 2.0
  w2_instability: 2.0
  w3_height_error: 4.0
  w4_slippage: 2.0
  w5_phase_error: 0.1
  w_action_rate: 0.001
  w_energy: 1e-7
  height_nominal: 0.42
  target_velocity: 0.4

env:
  num_envs: 256
  episode_length: 200
  robot: unitree_b1
  terrain: flat

logging:
  log_dir: logs/phase1
  run_name: walk_indirect_fixed
  save_interval: 100
  log_interval: 10

output:
  weights_path: weights/W_walk.npy
