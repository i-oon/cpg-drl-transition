# Phase 1 – Trot: Indirect encoding + diagonal phase offsets

cpg:
  alpha: 1.01
  freq_train: 1.0
  dt: 0.02

rbf:
  num_neurons: 20
  variance: 0.04

gait:
  name: trot
  phase_offsets: [0.0, 3.14159, 3.14159, 0.0]

pibb:
  exploration_noise: 0.05
  noise_decay_rate: 0.995
  temperature: 10.0
  init_var_boost: 2.0
  max_iterations: 1000
  convergence_threshold: 0.001

reward:
  w1_velocity: 2.0
  w2_instability: 2.0
  w3_height_error: 4.0
  w4_slippage: 2.0
  w5_phase_error: 0.1
  w_action_rate: 0.001
  w_energy: 1e-7
  height_nominal: 0.42
  target_velocity: 0.4

env:
  num_envs: 256
  episode_length: 200
  robot: unitree_b1
  terrain: flat

logging:
  log_dir: logs/phase1
  run_name: trot_indirect_fixed
  save_interval: 100
  log_interval: 10

output:
  weights_path: weights/W_trot.npy
